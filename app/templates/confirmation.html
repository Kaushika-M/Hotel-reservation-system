<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking</title>
</head>
<body>
    <h3>Confirm Booking</h3>
    <form action="/confirmation/{{room.id}}" method=POST>
        <label for="room_num">Room Number</label>
        <input type=number name="room_num" value="{{room.room_num}}" readonly>
        <br><br>
        <label for="room_type">Room Type</label>
        <input type=text name="room_type" value="{{room.room_type}}" readonly>
        <br><br>
        <label for="price">Price</label>
        <input type=number name="price" value="{{room.price}}" readonly>
        <br><br>
        <label for="check_in">Check-in</label>
        <input type=date name="check_in" required>
        <br><br>
        <label for="check_out">Check-out</label>
        <input type=date name="check_out" required>
        <br><br>
        <button type="submit">Confirm Booking</button>
        <a href="/search">Cancel</a>
    </form>
</body>
</html>
